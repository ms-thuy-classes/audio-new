<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Audio Player Pro</title>

<script src="https://unpkg.com/wavesurfer.js"></script>

<style>
body {
  margin: 0;
  font-family: sans-serif;
  background: #0f0f1a;
  color: white;
  display: flex;
  flex-direction: column;
  align-items: center;
}

h2 {
  margin-top: 20px;
}

/* player */
.player {
  width: 90%;
  max-width: 800px;
  margin-top: 20px;
}

#waveform {
  height: 80px;
}

/* timeline */
.timeline {
  height: 4px;
  background: linear-gradient(to right,#4facfe,#ff00cc);
  border-radius: 10px;
  margin-top: -10px;
}

/* controls */
.controls {
  display: flex;
  justify-content: center;
  gap: 15px;
  margin-top: 15px;
}

.btn {
  width: 45px;
  height: 45px;
  border-radius: 50%;
  background: rgba(255,255,255,0.1);
  display: flex;
  justify-content: center;
  align-items: center;
  cursor: pointer;
  transition: 0.3s;
}

.btn:hover {
  transform: scale(1.1);
  background: rgba(255,255,255,0.2);
}

/* time */
.time {
  display: flex;
  justify-content: space-between;
  font-size: 12px;
  margin-top: 5px;
  opacity: 0.7;
}

/* playlist */
.playlist {
  width: 90%;
  max-width: 800px;
  margin-top: 20px;
}

.track {
  padding: 12px;
  border-radius: 10px;
  margin-bottom: 8px;
  background: rgba(255,255,255,0.05);
  cursor: pointer;
  transition: 0.2s;
}

.track:hover {
  background: rgba(255,255,255,0.1);
}

.active {
  background: linear-gradient(to right,#4facfe,#ff00cc);
}

.track a {
  margin-right: 10px;
  font-size: 12px;
  color: #ccc;
  text-decoration: none;
}
</style>
</head>

<body>

<h2>🎧 Audio Player - ms-thuy-classes</h2>

<div class="player">
  <div id="waveform"></div>
  <div class="timeline"></div>

  <div class="time">
    <span id="current">00:00</span>
    <span id="total">00:00</span>
  </div>

  <div class="controls">
    <div class="btn" onclick="skip(-10)">⏪</div>
    <div class="btn" onclick="skip(-5)">◀</div>
    <div class="btn" onclick="playPause()">⏯</div>
    <div class="btn" onclick="skip(5)">▶</div>
    <div class="btn" onclick="skip(10)">⏩</div>
  </div>
</div>

<div class="playlist" id="playlist"></div>

<script>
let tracks = [];
let currentIndex = 0;

/* WaveSurfer */
const wavesurfer = WaveSurfer.create({
  container: '#waveform',
  waveColor: '#666',
  progressColor: '#ff00cc',
  height: 80,
  barWidth: 2,
  barGap: 2,
});

/* Format time */
function formatTime(sec){
  let m = Math.floor(sec/60);
  let s = Math.floor(sec%60);
  return `${m}:${s.toString().padStart(2,'0')}`;
}

/* Controls */
function playPause(){
  wavesurfer.playPause();
}

function skip(sec){
  wavesurfer.skip(sec);
}

/* Update time */
wavesurfer.on('ready', ()=>{
  document.getElementById('total').innerText =
    formatTime(wavesurfer.getDuration());
});

wavesurfer.on('audioprocess', ()=>{
  document.getElementById('current').innerText =
    formatTime(wavesurfer.getCurrentTime());
});

/* Load track */
function loadTrack(index){
  currentIndex = index;
  wavesurfer.load(tracks[index].src);
  updateActive();
}

/* Render playlist */
function renderPlaylist(){
  const el = document.getElementById("playlist");
  el.innerHTML = "";

  tracks.forEach((t,i)=>{
    let div = document.createElement("div");
    div.className = "track";

    div.innerHTML = `
      🎵 ${t.name}<br>
      <a href="${t.src}" target="_blank" onclick="event.stopPropagation()">🔗 Link</a>
      <a href="${t.src}" download onclick="event.stopPropagation()">⬇ Download</a>
    `;

    div.onclick = ()=> loadTrack(i);
    el.appendChild(div);
  });
}

/* Highlight active */
function updateActive(){
  document.querySelectorAll(".track").forEach((el,i)=>{
    el.classList.toggle("active", i === currentIndex);
  });
}

/* Auto next */
wavesurfer.on('finish', ()=>{
  currentIndex++;
  if(currentIndex >= tracks.length) currentIndex = 0;
  loadTrack(currentIndex);
  wavesurfer.play();
});

/* 🔥 AUTO LOAD FILE FROM YOUR REPO */
fetch("https://api.github.com/repos/ms-thuy-classes/audio-new/contents/audio")
  .then(res => res.json())
  .then(files => {
    tracks = files
      .filter(f => f.name.endsWith('.mp3'))
      .map(f => ({
        name: f.name,
        src: f.download_url
      }));

    renderPlaylist();
    loadTrack(0);
  });
</script>

</body>
</html>
